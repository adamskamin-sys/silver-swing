# Render blueprint: dashboard + two bot workers + shared Redis (Key Value).
# All three services read/write the SAME Redis instance so state is truly shared.
#
# BEFORE FIRST DEPLOY:
#   1. Upload your Coinbase API JSON as a Secret File on each worker named
#      `coinbase.json` (Render mounts it at /etc/secrets/coinbase.json).
#   2. Set DASHBOARD_PASSWORD in the dashboard service's env vars.

services:
  # ---- Shared Key Value (Redis) — single source of truth for state ---------
  - type: keyvalue
    name: silver-swing-state
    plan: free
    ipAllowList: []  # empty = allow all Render services in this workspace

  # ---- Dashboard (web, public URL) ------------------------------------------
  - type: web
    name: silver-swing-dashboard
    runtime: node
    plan: starter
    rootDir: dashboard
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DASHBOARD_SESSION_SECRET
        generateValue: true
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: silver-swing-state
          property: connectionString

  # ---- PAPER bot worker (safe: no real orders) ------------------------------
  - type: worker
    name: silver-swing-bot-paper
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: SWING_MODE
        value: paper
      - key: SWING_TENANT
        value: adam-paper
      - key: SWING_SYMBOL
        value: SLR-27AUG26-CDE
      - key: SWING_PAPER_BALANCE
        value: "100000"
      - key: COINBASE_API_KEY_JSON_PATH
        value: /etc/secrets/coinbase.json
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: silver-swing-state
          property: connectionString

  # ---- LIVE bot worker (REAL ORDERS) ----------------------------------------
  # 2026-07-19: SWING_LIVE_DRY_RUN key REMOVED from blueprint. Adam had it
  # unset in the Render UI (running live for real); leaving `value: "1"` here
  # caused a silent re-sync flip back INTO dry-run on the last blueprint push.
  # If you want a first pass in dry-run, set SWING_LIVE_DRY_RUN=1 IN THE UI
  # ONLY — never in this file.
  #
  # SWING_LIVE_CONFIRM=I_UNDERSTAND stays UI-only for the same reason: don't
  # let a stale blueprint accidentally flip real trading on/off.
  - type: worker
    name: silver-swing-bot-live
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: SWING_MODE
        value: live
      - key: SWING_TENANT
        value: adam-live
      - key: SWING_SYMBOL
        value: SLR-27AUG26-CDE
      # 2026-07-19: three expert-source-refactor flags flipped ON per
      # Adam's "go live" directive. All three ship canonical peer-
      # reviewed mechanisms; see the respective flag_enabled() docstrings
      # for source citations + enable path notes.
      #   B  — Kaufman ER modulation (Perry Kaufman TSaM 2013)
      #   D-1 — Faber SMA + MOP TSM trend filter (Faber 2007, MOP 2012)
      #   D-2 — Harvey vol-target sizing (Harvey 2018 JPM)
      - key: SWING_ER_MODULATION_ENABLED
        value: "1"
      - key: SWING_TREND_FILTER_ENABLED
        value: "1"
      - key: SWING_VOL_TARGET_ENABLED
        value: "1"
      - key: COINBASE_API_KEY_JSON_PATH
        value: /etc/secrets/coinbase.json
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: silver-swing-state
          property: connectionString
