# Render blueprint: dashboard + two bot workers + shared Redis (Key Value).
# All three services read/write the SAME Redis instance so state is truly shared.
#
# BEFORE FIRST DEPLOY:
#   1. Upload your Coinbase API JSON as a Secret File on each worker named
#      `coinbase.json` (Render mounts it at /etc/secrets/coinbase.json).
#   2. Set DASHBOARD_PASSWORD in the dashboard service's env vars.

services:
  # ---- Shared Key Value (Redis) — single source of truth for state ---------
  - type: keyvalue
    name: silver-swing-state
    plan: free
    ipAllowList: []  # empty = allow all Render services in this workspace

  # ---- Dashboard (web, public URL) ------------------------------------------
  - type: web
    name: silver-swing-dashboard
    runtime: node
    plan: starter
    rootDir: dashboard
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DASHBOARD_SESSION_SECRET
        generateValue: true
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: silver-swing-state
          property: connectionString

  # ---- PAPER bot worker (safe: no real orders) ------------------------------
  - type: worker
    name: silver-swing-bot-paper
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: SWING_MODE
        value: paper
      - key: SWING_TENANT
        value: adam-paper
      - key: SWING_SYMBOL
        value: SLR-27AUG26-CDE
      - key: SWING_PAPER_BALANCE
        value: "100000"
      - key: COINBASE_API_KEY_JSON_PATH
        value: /etc/secrets/coinbase.json
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: silver-swing-state
          property: connectionString

  # ---- LIVE bot worker (REAL ORDERS — starts in dry-run) --------------------
  # First deploy uses SWING_LIVE_DRY_RUN=1: full wiring, real feed, orders are
  # LOGGED not submitted. Confirm the pipeline is clean, then flip to
  # SWING_LIVE_CONFIRM=I_UNDERSTAND (and remove SWING_LIVE_DRY_RUN) in the
  # Render UI to go actually live.
  - type: worker
    name: silver-swing-bot-live
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: SWING_MODE
        value: live
      - key: SWING_TENANT
        value: adam-live
      - key: SWING_SYMBOL
        value: SLR-27AUG26-CDE
      - key: SWING_LIVE_DRY_RUN
        value: "1"
      - key: COINBASE_API_KEY_JSON_PATH
        value: /etc/secrets/coinbase.json
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: silver-swing-state
          property: connectionString
